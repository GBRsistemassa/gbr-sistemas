<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#07080f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GBR Sistemas">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2307080f'/><text y='.9em' font-size='80'>🚗</text></svg>">
<title>GBR Sistemas — Plataforma de Gestão</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script>
function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  if (!t) return;
  const icons = {ok:'✓', err:'✕', info:'ℹ', warn:'⚠'};
  t.innerHTML = (icons[type]||'') + ' ' + msg;
  t.className = 'show t-' + type;
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.className = '', 3500);
}
</script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
  // Inicialização do Firebase [cite: 4]
  firebase.initializeApp({
    apiKey:"AIzaSyAdn8IUIWhZUhvHNAg5jEYAPwtCSaQbKA0",
    authDomain:"gbr-sistemas-saas.firebaseapp.com",
    databaseURL:"https://gbr-sistemas-saas-default-rtdb.firebaseio.com",
    projectId:"gbr-sistemas-saas",
    storageBucket:"gbr-sistemas-saas.firebasestorage.app",
    messagingSenderId:"329609507285",
    appId:"1:329609507285:web:d2c1c9ac41e6e8d8e5cd5c"
  });
  
  var _fbDB=firebase.database(),_fbAuth=firebase.auth();
  window._tenantId=null;
  window._isInitializing=false;

  // Lógica de Autenticação e Estabilidade [cite: 7, 24]
  _fbAuth.onAuthStateChanged(async function(user){
    if(user){
      if(window._isInitializing) return;
      window._isInitializing=true;
      
      try {
        var emailKey=user.email.replace(/\./g,'_').replace(/@/g,'__');
        var snapTenant=await _fbDB.ref('userTenants/'+emailKey).once('value');
        var tenantData=snapTenant.val();

        if(tenantData && tenantData.tenantId){
          window._tenantId=tenantData.tenantId;
          window._userRole=tenantData.role;
          
          // Verificação de Licença e Kill Switch [cite: 7, 8, 22]
          var snapLic=await _fbDB.ref('tenants/'+window._tenantId+'/licenca').once('value');
          var lic=snapLic.val()||{};

          if(lic.killSwitch===true || lic.status==='inativo'){
            document.getElementById('loginScreen').style.display='none';
            document.getElementById('lockScreen').style.display='flex';
            document.getElementById('lockMsg').textContent='Acesso suspenso. Entre em contato com o suporte.';
            return;
          }

          document.getElementById('loginScreen').style.display='none';
          document.body.classList.add('logged-in');
          if(typeof initApp === 'function') await initApp();
        } else {
          toast('Usuário não vinculado.','err');
          _fbAuth.signOut();
        }
      } catch(e){ console.error(e); }
      window._isInitializing=false;
    } else {
      document.body.classList.remove('logged-in');
      document.getElementById('loginScreen').style.display='flex';
    }
  });

  // Funções de Manual Interno 
  window.abrirManual = function(topico) {
    const conteudos = {
      geral: "O sistema GBR permite a gestão completa da sua estética através de agendamentos e controle financeiro.",
      clientes: "Cadastre clientes com CPF/CNPJ para histórico detalhado e fidelidade.",
      agenda: "Gerencie serviços e horários. O sistema calcula automaticamente o tempo de execução.",
      caixa: "Registre todas as movimentações do dia para um fechamento preciso.",
      estoque: "Controle produtos e insumos por unidade ou volume (ml/g).",
      whatsapp: "Envie lembretes e promoções usando variáveis como [NOME] e [VEICULO]."
    };
    document.getElementById('manualBody').innerHTML = `<p>${conteudos[topico] || 'Instruções em breve.'}</p>`;
  };

  // WhatsApp Marketing Templates 
  window.templatesMkt = [
    { nome: "Boas-vindas", msg: "Olá [NOME], seja bem-vindo! É um prazer cuidar do seu [VEICULO]." },
    { nome: "Lembrete", msg: "Olá [NOME], confirmamos seu horário amanhã às [HORA]. Até logo!" },
    { nome: "Promoção", msg: "Olá [NOME], temos uma oferta especial para o seu [VEICULO] esta semana!" }
  ];
</script>

<style>
/* CSS Base preservado [cite: 27, 28] */
:root{
  --bg:#07080f;--surface:#0f1018;--accent:#4fc3f7;--text:#e8eaf6;
  --font-d:'Bebas Neue',sans-serif;--font-b:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);}
#loginScreen, #lockScreen {position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.page {display:none;} .page.active {display:block;}
/* ... (Estilos originais de tabelas e botões mantidos) ... */
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <h1 class="login-logo">GBR<span>.</span></h1>
    <div class="lf"><label>E-mail</label><input type="email" id="loginEmail"></div>
    <div class="lf"><label>Senha</label><input type="password" id="loginPass"></div>
    <button id="btnLogin" class="btn" onclick="doLogin()">Entrar</button>
  </div>
</div>

<div id="lockScreen" style="display:none;">
  <div class="card"><h1 id="lockIcon">🔒</h1><p id="lockMsg"></p></div>
</div>

<div id="app-interface">
  <nav id="sidebar">
    <div class="ni active" onclick="showPage('dashboard')"><i class="fas fa-home"></i> Dashboard</div>
    <div class="ni" onclick="showPage('clientes')"><i class="fas fa-users"></i> Clientes</div>
    <div class="ni" onclick="showPage('admin')"><i class="fas fa-shield-alt"></i> Admin</div>
  </nav>

  <main id="main">
    <div id="page-admin" class="page">
      <div class="admin-nav" style="display:flex;gap:10px;margin-bottom:20px;">
        <button onclick="showAdminTab('auditoria')">Auditoria</button>
        <button onclick="showAdminTab('manual')">Manual</button>
        <button onclick="showAdminTab('integracoes')">Integrações</button>
      </div>
      
      <div id="admin-manual" class="admin-content">
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
          <button onclick="abrirManual('clientes')">Clientes</button>
          <button onclick="abrirManual('agenda')">Agenda</button>
          <button onclick="abrirManual('whatsapp')">WhatsApp</button>
        </div>
        <div id="manualBody" style="margin-top:20px;padding:15px;background:var(--surface);"></div>
      </div>
    </div>
  </main>
</div>

</body>
</html>
