<script>
// --- CONFIGURAÇÃO FIREBASE (MANTIDA) ---
// (Certifique-se de que suas chaves estão aqui)

// --- MELHORIA DE ESTABILIDADE (ÚNICA MUDANÇA NO SCRIPT) ---
window._tenantID = null;
window._isInitializing = false;

firebase.auth().onAuthStateChanged(async function(user) {
  if (user) {
    if (window._isInitializing) return;
    window._isInitializing = true;

    try {
      // 1. Busca o vínculo do usuário com a estética (isolamento)
      const userRef = firebase.database().ref('users/' + user.uid);
      const snap = await userRef.once('value');
      const userData = snap.val();

      if (userData && userData.tenantId) {
        window._tenantID = userData.tenantId;
        window._userRole = userData.role || 'operador';

        // 2. Verifica se a licença está ativa no nó do inquilino
        const licSnap = await firebase.database().ref('tenants/' + window._tenantID + '/license').once('value');
        const license = licSnap.val();

        if (license && license.status === 'blocked') {
          // Se bloqueado, mostra sua tela de bloqueio original
          document.body.classList.remove('logged-in');
          // (Aqui acionaria seu modal de assinatura bloqueada)
        } else {
          // 3. Sucesso: Libera o sistema
          document.body.classList.add('logged-in');
          if (typeof initApp === 'function') await initApp();
        }
      } else {
        console.error("Usuário sem tenantId.");
        firebase.auth().signOut();
      }
    } catch (e) {
      console.error("Erro no fluxo de auth:", e);
    }
    window._isInitializing = false;
  } else {
    document.body.classList.remove('logged-in');
  }
});

/* MANTIDAS TODAS AS SUAS FUNÇÕES ORIGINAIS (LINHAS 2200 A 2500+)
